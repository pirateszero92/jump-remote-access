<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDP Desktop</title>
  <link rel="icon" type="image/svg+xml" href="/assets/jump-icon.svg">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0f16;
      font-family: Consolas, 'Courier New', monospace;
    }

    .rdp-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #display {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #020917;
      position: relative;
    }

    .rdp-display-surface {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .rdp-display-surface > div {
      transform-origin: top left;
    }

    .rdp-status {
      padding: 6px 10px;
      font-size: 11px;
      color: #9fb0cc;
      background: #111827;
      border-top: 1px solid #283244;
    }

    .rdp-status.err {
      color: #ff8fa3;
    }
  </style>
</head>
<body>
  <div class="rdp-shell">
    <div id="display"></div>
    <div class="rdp-status" id="status">Connecting...</div>
  </div>

  <script src="/vendor/guacamole/guacamole-common.min.js"></script>
  <script src="/rdp/rdp.js?v=1.1.1"></script>
</body>
</html>
