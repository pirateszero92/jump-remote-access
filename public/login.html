<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Jump Remote Access</title>
  <link rel="icon" type="image/svg+xml" href="/assets/jump-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      background: #080a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      filter: blur(80px);
      z-index: -1;
      animation: glow-move 15s infinite alternate ease-in-out;
    }

    @keyframes glow-move {
      0% { transform: translate(-30%, -20%) scale(1); }
      100% { transform: translate(20%, 30%) scale(1.2); }
    }

    .login-card {
      width: 400px;
      padding: 40px;
      background: rgba(21, 24, 32, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: card-in 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes card-in {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      font-family: var(--display);
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 30px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .login-logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .login-fld {
      text-align: left;
      margin-bottom: 20px;
    }

    .login-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 8px;
      display: block;
    }

    .login-input-group {
      position: relative;
    }

    .login-input-group i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
    }

    .login-input {
      padding-left: 40px !important;
    }

    .login-btn {
      margin-top: 10px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #00b08e);
      box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-err {
      background: var(--red-dim);
      color: var(--red);
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid rgba(255, 77, 106, 0.2);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark"><i class="fa-solid fa-network-wired"></i></div>
      JUMP ACCESS
    </div>

    <div id="login-error" class="login-err"></div>

    <form id="login-form">
      <div class="login-fld">
        <label class="login-label">Username</label>
        <div class="login-input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="user" class="login-input" placeholder="Enter username" required autofocus>
        </div>
      </div>

      <div class="login-fld">
        <label class="login-label">Password</label>
        <div class="login-input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="pass" class="login-input" placeholder="Enter password" required>
        </div>
      </div>

      <button type="submit" class="btn-conn login-btn" id="login-btn">
        Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </form>
  </div>

  <script src="/login.js?v=1.0.1"></script>
</body>
</html>
