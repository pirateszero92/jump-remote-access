<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH Terminal</title>
  <link rel="icon" type="image/svg+xml" href="/assets/jump-icon.svg">
  <link rel="shortcut icon" href="/assets/jump-icon.svg">
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0c0f16;
      overflow: hidden;
      font-family: Consolas, 'Courier New', monospace;
    }

    .ssh-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      box-sizing: border-box;
      background: linear-gradient(180deg, rgba(10, 14, 24, 0.92), #0c0f16);
    }

    #terminal {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 1px solid #283244;
      border-radius: 8px;
      box-sizing: border-box;
      background: #020917;
      overflow: hidden;
    }

    #terminal .xterm,
    #terminal .xterm-viewport {
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="ssh-shell">
    <div id="terminal"></div>
  </div>

  <script src="/vendor/xterm/lib/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
  <script src="/ssh/ssh.js"></script>
</body>
</html>
