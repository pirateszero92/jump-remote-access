<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noVNC Embedded</title>
  <style>
    html,
    body,
    #screen {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'JetBrains Mono', Consolas, monospace;
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(8, 12, 16, 0.9);
      border: 1px solid #2f3a46;
      color: #8ea2bc;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      max-width: calc(100% - 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status.err {
      color: #ff738f;
      border-color: #ff738f;
    }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="status">Connecting...</div>

  <script type="module">
    import RFB from '/novnc/core/rfb.js';

    const params = new URLSearchParams(window.location.search);

    const token = params.get('token') || '';
    const ip = params.get('ip') || '';
    const port = params.get('port') || '';
    const username = params.get('username') || '';
    const password = params.get('password') || '';
    const quality = params.get('quality') || 'med';

    const statusEl = document.getElementById('status');
    const targetEl = document.getElementById('screen');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('err', isError);
    }

    if (!token) {
      setStatus('Missing VNC token', true);
      throw new Error('Missing VNC token');
    }

    const wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${wsScheme}://${window.location.host}/websockify/?token=${encodeURIComponent(token)}`;

    const rfb = new RFB(targetEl, wsUrl, {
      credentials: { username, password },
      shared: true,
    });

    rfb.scaleViewport = true;
    rfb.resizeSession = false;
    rfb.background = '#101216';

    if (quality === 'high') {
      rfb.qualityLevel = 8;
      rfb.compressionLevel = 2;
    } else if (quality === 'low') {
      rfb.qualityLevel = 3;
      rfb.compressionLevel = 7;
    } else {
      rfb.qualityLevel = 6;
      rfb.compressionLevel = 4;
    }

    rfb.addEventListener('connect', () => {
      setStatus(`Connected to ${ip}:${port}`);
      setTimeout(() => {
        statusEl.style.opacity = '0.55';
      }, 2500);
    });

    rfb.addEventListener('disconnect', (event) => {
      const clean = event?.detail?.clean;
      setStatus(clean ? 'Disconnected' : 'Connection dropped', !clean);
    });

    rfb.addEventListener('securityfailure', (event) => {
      const reason = event?.detail?.reason || 'VNC security negotiation failed';
      setStatus(reason, true);
    });

    rfb.addEventListener('credentialsrequired', () => {
      if (!username && !password) {
        setStatus('VNC server requires credentials (username/password)', true);
        return;
      }

      setStatus('Sending VNC credentials...');
      rfb.sendCredentials({ username, password });
    });

    // RealVNC-style key verification. Auto-approve to avoid stuck "Connecting...".
    rfb.addEventListener('serververification', () => {
      setStatus('Verifying server identity...');
      rfb.approveServer();
    });

    window.addEventListener('beforeunload', () => {
      try {
        rfb.disconnect();
      } catch {
        // ignore
      }
    });
  </script>
</body>
</html>
