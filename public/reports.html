<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH Session Reports - Jump Access</title>
  <link rel="icon" type="image/svg+xml" href="/assets/jump-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/themes.css">
  <link rel="stylesheet" href="/reports.css">
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css">
</head>
<body class="reports-page">
  <div class="topbar reports-topbar">
    <div class="logo">
      <button class="sidebar-toggle-btn reports-menu-btn" id="btn-sidebar-toggle" type="button" title="Sessions list" aria-label="Toggle sessions">
        <i class="fa-solid fa-list"></i>
      </button>
      <a class="logo-link" href="/" title="Back to Jump Access"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="logo-mark"><i class="fa-solid fa-chart-line"></i></div>
      <span class="reports-topbar-title">SSH Reports</span>
    </div>
    <div class="topbar-right">
      <div class="schip"><div class="sdot g"></div><span id="report-count">0 sessions</span></div>
      <div class="vseparator"></div>
      <button class="logout-btn" onclick="handleLogout()" type="button"><i class="fa-solid fa-power-off"></i> Logout</button>
    </div>
  </div>

  <div class="reports-layout" id="reports-layout">
    <div class="sidebar-backdrop hidden" id="sidebar-backdrop"></div>

    <aside class="reports-sidebar" id="reports-sidebar">
      <div class="psec">
        <div class="slabel">Filter</div>
        <div class="reports-filters">
          <label class="flabel" for="filter-year">Year</label>
          <select id="filter-year"></select>
          <label class="flabel" for="filter-month">Month</label>
          <select id="filter-month">
            <option value="">All months</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
          <button class="btn primary full" id="btn-load-report" type="button">Load report</button>
        </div>
      </div>

      <div class="psec reports-list-wrap">
        <div class="slabel">Sessions</div>
        <div id="session-list" class="session-list"></div>
      </div>
    </aside>

    <main class="reports-main">
      <div class="report-viewport">
        <div id="report-empty" class="report-empty">
          <p>เลือก session จากรายการ</p>
        </div>

        <div id="report-detail" class="report-detail hidden">
          <header class="replay-session-bar">
            <span class="replay-session-bar-label">Replaying</span>
            <span class="replay-session-bar-title" id="detail-title">—</span>
            <div class="replay-controls">
              <label class="flabel" for="replay-speed">Speed</label>
              <select id="replay-speed">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
              </select>
              <button class="vt-btn" id="btn-replay-play" type="button">Play</button>
              <button class="vt-btn" id="btn-replay-pause" type="button">Pause</button>
              <button class="vt-btn" id="btn-replay-reset" type="button">Reset</button>
            </div>
          </header>

          <div class="replay-display">
            <div id="replay-terminal" class="replay-terminal"></div>
          </div>

          <footer class="replay-timeline">
            <span class="timeline-time" id="timeline-current">0:00</span>
            <div class="timeline-track">
              <div class="timeline-markers" id="timeline-markers"></div>
              <input type="range" id="timeline-scrub" class="timeline-scrub" min="0" max="1000" value="0" step="1">
            </div>
            <span class="timeline-time" id="timeline-total">0:00</span>
          </footer>
        </div>
      </div>
    </main>
  </div>

  <script src="/theme.js"></script>
  <script src="/vendor/xterm/lib/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
  <script src="/reports.js?v=1.1.1"></script>
</body>
</html>
